LIBERTY_HOME="/opt/ibm/wlp"
SERVER_NAME="server1"

APP_WAR="/opt/ibm/wlp/usr/servers/server1/apps/APP1.war"

APP_OWNER="liberty"
APP_GROUP="liberty"

BACKUP_DIR="/opt/deploy/backup"
LOCK_FILE="/var/lock/app-deploy.lock"

# ヘルスチェック用URL
# 空文字にするとLibertyのserver statusで確認する
HEALTH_URL="http://127.0.0.1:9080/APP1/health"

# 起動確認回数と間隔
HEALTH_CHECK_COUNT="30"
HEALTH_CHECK_INTERVAL="2"
HEALTH_CHECK_TIMEOUT="5"

# 保存するバックアップWAR数
BACKUP_RETAIN_COUNT="10"